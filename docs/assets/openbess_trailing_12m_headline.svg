<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">OpenBESS trailing-12-month Stack Index evidence</title>
  <desc id="desc">A compact chart showing the canonical trailing-12-month cache: perfect foresight GBP 49,439, previous-day rolling policy GBP 17,402, degradation-adjusted rolling value GBP 12,053, 35.2 percent capture and full trailing-12-month coverage.</desc>
  <rect width="920" height="360" fill="#f8fafc"/>
  <rect x="26" y="26" width="868" height="308" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="54" y="70" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">OpenBESS Stack Index</text>
  <text x="54" y="98" font-family="Arial, sans-serif" font-size="15" fill="#475569">Canonical trailing-12m cache, 2025-05-20 to 2026-05-20 UTC, openbess_canonical_1mw_2mwh</text>

  <text x="54" y="142" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#334155">Reference asset evidence</text>
  <line x1="54" y1="282" x2="650" y2="282" stroke="#94a3b8"/>

  <rect x="86" y="199" width="94" height="83" fill="#0f766e"/>
  <text x="133" y="306" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#334155">Rolling</text>
  <text x="133" y="187" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#0f766e">GBP 17,402</text>

  <rect x="276" y="225" width="94" height="57" fill="#2563eb"/>
  <text x="323" y="306" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#334155">Deg.-adjusted</text>
  <text x="323" y="213" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2563eb">GBP 12,053</text>

  <rect x="466" y="48" width="94" height="234" fill="#d97706"/>
  <text x="513" y="306" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#334155">Perfect foresight</text>
  <text x="513" y="36" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#d97706">GBP 49,439</text>
  <text x="513" y="323" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#64748b">upper bound</text>

  <rect x="690" y="86" width="148" height="148" rx="74" fill="#2563eb"/>
  <circle cx="764" cy="160" r="48" fill="#ffffff"/>
  <text x="764" y="150" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#0f172a">35.2%</text>
  <text x="764" y="174" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#475569">rolling capture</text>
  <text x="764" y="252" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#334155">trailing-12m gate passed</text>
  <text x="764" y="274" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">17,520 settlement periods</text>

  <text x="54" y="330" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Caveats: wholesale proxy, price-taking EAC availability, BM excluded, CM scenario sidecar, finance is not bankability, not an official market index.</text>
</svg>
